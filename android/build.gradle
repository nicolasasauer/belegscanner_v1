// Projekt-Level Build-Konfiguration
allprojects {
    repositories {
        google()
        mavenCentral()
    }

    // Global override: force every Kotlin compile task in every project (including
    // the root project itself) to target JVM 17.
    tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).configureEach {
        kotlinOptions {
            jvmTarget = "17"
        }
    }
}

rootProject.buildDir = "../build"
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}
subprojects {
    project.evaluationDependsOn(":app")
}

// AGP 8+ requires a namespace declaration in every library module's build.gradle.
// Older Flutter plugins (e.g. image_gallery_saver) don't declare one, so we
// inject the plugin's group ID as its namespace using pluginManager.withPlugin,
// which fires eagerly when the plugin is applied – never after evaluation.
// We also force Java 17 compileOptions here so that compileDebugJavaWithJavac
// and compileDebugKotlin always use the same JVM target (avoids mismatch errors).
subprojects {
    pluginManager.withPlugin('com.android.library') {
        if (android.namespace == null) {
            android.namespace = project.group
        }
        android {
            compileOptions {
                sourceCompatibility JavaVersion.VERSION_17
                targetCompatibility JavaVersion.VERSION_17
            }
        }
    }
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}
