// Projekt-Level Build-Konfiguration
allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

rootProject.buildDir = "../build"
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}
subprojects {
    project.evaluationDependsOn(":app")
}

// AGP 8+ requires a namespace declaration in every library module's build.gradle.
// Older Flutter plugins (e.g. image_gallery_saver) don't declare one, so we
// inject the plugin's group ID as its namespace using pluginManager.withPlugin,
// which fires eagerly when the plugin is applied – never after evaluation.
subprojects {
    pluginManager.withPlugin('com.android.library') {
        if (android.namespace == null) {
            android.namespace = project.group
        }
    }
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}
