name: belegscanner_v1
description: Eine Flutter-App zum Einscannen, Speichern und Filtern von Belegen.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Google ML Kit für OCR-Texterkennung
  google_mlkit_text_recognition: ^0.13.1

  # Datum- und Währungsformatierung
  intl: ^0.19.0

  # Bildauswahl aus Galerie oder Kamera
  image_picker: ^1.1.2

  # UUID-Generierung für eindeutige IDs
  uuid: ^4.4.2

  # Lokale SQLite-Datenbank
  sqflite: ^2.3.3+1

  # Pfad-Utilities (wird von sqflite benötigt)
  path: ^1.9.0

  # Datei-Sharing (CSV-Export per E-Mail, Messenger, Cloud)
  share_plus: ^10.1.0

  # Bilder in der Gerätegalerie speichern
  gal: ^2.3.2

  # Permanentes App-Verzeichnis für Belegbilder
  path_provider: ^2.1.4

  # Diagramme für das Statistik-Dashboard
  fl_chart: ^0.69.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  adaptive_icon_foreground: "assets/icon.png"
  adaptive_icon_background: "#3F51B5"

flutter:
  uses-material-design: true
